<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>水彩小鸡</title>
  <style>
    :root {
      --bubble: #fffaf0;
      --ink: #35271f;
      --soil: #a46e38;
      --grass: #2f9355;
      --spark: #fff3a5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(#a7defa, #bce98c);
    }

    .scene {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .scene-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transform: scale(1.035);
      animation: backgroundDrift 18s ease-in-out infinite;
      z-index: -8;
      user-select: none;
      -webkit-user-drag: none;
    }

    .bg-wash {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 49% 69%, rgba(255, 245, 150, .34), transparent 26%),
        linear-gradient(180deg, rgba(255, 255, 255, .08), transparent 38%, rgba(74, 128, 55, .16));
      pointer-events: none;
      z-index: -7;
    }

    .source-note {
      position: fixed;
      left: 12px;
      bottom: 10px;
      z-index: 20;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .68);
      color: rgba(53, 39, 31, .72);
      font-size: 12px;
      backdrop-filter: blur(8px);
    }

    .stage {
      position: relative;
      width: min(92vw, 590px);
      height: min(80vh, 620px);
      min-height: 500px;
      display: grid;
      place-items: center;
      cursor: pointer;
      outline: none;
      z-index: 5;
    }

    .stage:focus-visible {
      filter: drop-shadow(0 0 18px rgba(43, 105, 255, .46));
    }

    .dirt {
      position: absolute;
      left: 50%;
      bottom: 45px;
      width: 350px;
      height: 60px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 24% 48%, rgba(255, 235, 155, .34) 0 7%, transparent 8%),
        radial-gradient(circle at 74% 40%, rgba(255, 235, 155, .22) 0 6%, transparent 7%),
        linear-gradient(180deg, #c89153, var(--soil));
      transform: translateX(-50%);
      box-shadow: inset 0 13px 18px rgba(255, 233, 154, .2);
      opacity: .78;
      z-index: -1;
    }

    .shadow {
      position: absolute;
      left: 50%;
      bottom: 69px;
      width: 278px;
      height: 42px;
      border-radius: 50%;
      background: rgba(40, 80, 38, .28);
      transform: translateX(-50%);
      animation: shadowHop 1.3s ease-in-out infinite;
      z-index: 0;
    }

    .chick-wrap {
      position: absolute;
      left: 50%;
      bottom: 82px;
      width: min(69vw, 355px);
      max-width: 370px;
      transform: translateX(-50%);
      animation: chickHop 1.3s ease-in-out infinite;
      z-index: 3;
    }

    .chick-tilt {
      position: relative;
      animation: chickTilt 2.1s ease-in-out infinite;
      transform-origin: 50% 82%;
    }

    .asset-chick {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      filter:
        drop-shadow(0 18px 10px rgba(73, 63, 30, .22))
        drop-shadow(0 0 18px rgba(255, 239, 113, .2));
      user-select: none;
      -webkit-user-drag: none;
    }

    .glow {
      position: absolute;
      inset: 12% 8%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 242, 109, .42), transparent 68%);
      filter: blur(13px);
      animation: glowPulse 1.8s ease-in-out infinite;
      z-index: -1;
    }

    .bubble {
      position: absolute;
      top: 54px;
      left: 63%;
      min-width: 74px;
      padding: 10px 16px;
      border-radius: 24px 24px 24px 8px;
      background: var(--bubble);
      color: var(--ink);
      font-size: 18px;
      font-weight: 800;
      text-align: center;
      opacity: 0;
      transform: translate(-50%, 18px) scale(.75);
      box-shadow: 0 14px 28px rgba(52, 91, 114, .16);
      pointer-events: none;
      z-index: 10;
    }

    .bubble.show {
      animation: chirp 1s ease-out both;
    }

    .egg {
      position: absolute;
      bottom: 88px;
      width: 92px;
      height: 58px;
      border-radius: 18px 18px 34px 34px;
      background: linear-gradient(#fffdf3, #eadbb9);
      clip-path: polygon(0 22%, 14% 0, 28% 22%, 43% 2%, 58% 26%, 73% 0, 88% 24%, 100% 8%, 100% 100%, 0 100%);
      filter: drop-shadow(0 8px 5px rgba(62, 75, 40, .12));
      animation: shellBob 2s ease-in-out infinite;
      z-index: 1;
    }

    .egg.left {
      left: 78px;
      transform: rotate(-15deg);
    }

    .egg.right {
      right: 72px;
      transform: rotate(16deg);
      animation-delay: -.8s;
    }

    .spark,
    .firefly {
      position: absolute;
      pointer-events: none;
    }

    .spark {
      width: 13px;
      height: 13px;
      opacity: 0;
      z-index: 8;
      animation: sparkle 2.4s ease-in-out infinite;
    }

    .spark::before,
    .spark::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 18px;
      border-radius: 999px;
      background: var(--spark);
      transform: translate(-50%, -50%);
    }

    .spark::after {
      background: #ff8fc6;
      transform: translate(-50%, -50%) rotate(90deg);
    }

    .spark.one { left: 19%; top: 27%; animation-delay: -.1s; }
    .spark.two { right: 18%; top: 32%; transform: scale(.8); animation-delay: -.8s; }
    .spark.three { left: 31%; top: 15%; transform: scale(.65); animation-delay: -1.5s; }

    .petal {
      position: absolute;
      top: -8vh;
      width: 14px;
      height: 9px;
      border-radius: 80% 20% 80% 20%;
      background: rgba(255, 159, 185, .72);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .22);
      pointer-events: none;
      z-index: 2;
      animation: petalFall var(--duration) linear infinite;
      animation-delay: var(--delay);
    }

    .petal:nth-child(1) { left: 7%; --duration: 12s; --delay: -2s; }
    .petal:nth-child(2) { left: 16%; --duration: 15s; --delay: -9s; transform: scale(.78); }
    .petal:nth-child(3) { left: 27%; --duration: 14s; --delay: -5s; background: rgba(255, 228, 123, .75); }
    .petal:nth-child(4) { left: 41%; --duration: 17s; --delay: -12s; transform: scale(.88); }
    .petal:nth-child(5) { left: 56%; --duration: 13s; --delay: -7s; background: rgba(255, 255, 255, .78); }
    .petal:nth-child(6) { left: 68%; --duration: 16s; --delay: -3s; transform: scale(.72); }
    .petal:nth-child(7) { left: 79%; --duration: 12s; --delay: -10s; background: rgba(255, 220, 116, .72); }
    .petal:nth-child(8) { left: 91%; --duration: 18s; --delay: -6s; transform: scale(.82); }

    .firefly {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 247, 149, .95);
      box-shadow: 0 0 14px rgba(255, 235, 88, .72);
      z-index: 4;
      animation: fireflyFloat 4.8s ease-in-out infinite;
    }

    .firefly.one { left: 20%; top: 60%; animation-delay: -.3s; }
    .firefly.two { left: 72%; top: 54%; animation-delay: -1.2s; }
    .firefly.three { left: 63%; top: 76%; animation-delay: -2.4s; }
    .firefly.four { left: 34%; top: 72%; animation-delay: -3.1s; }

    .butterfly {
      position: absolute;
      width: 42px;
      height: 32px;
      pointer-events: none;
      z-index: 3;
      animation: butterflyPath 9s ease-in-out infinite;
    }

    .butterfly.one { left: 10%; top: 34%; animation-delay: -1s; }
    .butterfly.two { right: 13%; top: 25%; transform: scale(.76); animation-delay: -5s; }

    .butterfly::before,
    .butterfly::after {
      content: "";
      position: absolute;
      top: 5px;
      width: 20px;
      height: 25px;
      border-radius: 50% 50% 45% 45%;
      background: linear-gradient(#ff9acc, #856cff);
      transform-origin: 100% 50%;
      animation: butterflyWing .42s ease-in-out infinite alternate;
    }

    .butterfly::after {
      right: 0;
      transform-origin: 0 50%;
      animation-name: butterflyWingRight;
    }

    .butterfly span {
      position: absolute;
      left: 19px;
      top: 8px;
      width: 4px;
      height: 22px;
      border-radius: 999px;
      background: #3d3754;
    }

    .grass-blade {
      position: absolute;
      bottom: 0;
      width: 9px;
      height: 60px;
      border-radius: 100% 0;
      background: rgba(34, 123, 68, .86);
      transform-origin: 50% 100%;
      animation: grassMove 2.4s ease-in-out infinite;
      z-index: 7;
    }

    .blade-1 { left: 7%; height: 72px; animation-delay: -.3s; }
    .blade-2 { left: 18%; height: 46px; animation-delay: -1.1s; }
    .blade-3 { left: 28%; height: 60px; animation-delay: -.8s; }
    .blade-4 { right: 25%; height: 52px; animation-delay: -1.6s; }
    .blade-5 { right: 14%; height: 70px; animation-delay: -.5s; }
    .blade-6 { right: 6%; height: 48px; animation-delay: -1.3s; }

    @keyframes backgroundDrift {
      0%, 100% { transform: scale(1.035) translate3d(0, 0, 0); }
      50% { transform: scale(1.055) translate3d(-10px, -5px, 0); }
    }

    @keyframes chickHop {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      45% { transform: translateX(-50%) translateY(-22px); }
      62% { transform: translateX(-50%) translateY(-14px); }
    }

    @keyframes chickTilt {
      0%, 100% { transform: rotate(-2.5deg); }
      50% { transform: rotate(3deg); }
    }

    @keyframes shadowHop {
      0%, 100% { transform: translateX(-50%) scaleX(1); opacity: .28; }
      45% { transform: translateX(-50%) scaleX(.72); opacity: .16; }
    }

    @keyframes glowPulse {
      0%, 100% { transform: scale(.95); opacity: .62; }
      50% { transform: scale(1.08); opacity: .92; }
    }

    @keyframes chirp {
      0% { opacity: 0; transform: translate(-50%, 18px) scale(.75); }
      18% { opacity: 1; transform: translate(-50%, 0) scale(1.05); }
      70% { opacity: 1; transform: translate(-50%, -8px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -28px) scale(.9); }
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: translateY(10px) rotate(0) scale(.55); }
      35% { opacity: 1; transform: translateY(0) rotate(24deg) scale(1); }
      65% { opacity: .45; transform: translateY(-14px) rotate(45deg) scale(.8); }
    }

    @keyframes shellBob {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -5px; }
    }

    @keyframes petalFall {
      0% { translate: 0 -10vh; rotate: 0deg; opacity: 0; }
      8% { opacity: .95; }
      52% { translate: 42px 50vh; rotate: 190deg; }
      100% { translate: -28px 112vh; rotate: 360deg; opacity: 0; }
    }

    @keyframes fireflyFloat {
      0%, 100% { transform: translate3d(0, 0, 0) scale(.75); opacity: .2; }
      35% { transform: translate3d(18px, -24px, 0) scale(1); opacity: .9; }
      70% { transform: translate3d(-12px, 16px, 0) scale(.85); opacity: .48; }
    }

    @keyframes grassMove {
      0%, 100% { transform: skewX(-7deg); }
      50% { transform: skewX(10deg); }
    }

    @keyframes butterflyPath {
      0%, 100% { translate: 0 0; rotate: -8deg; }
      30% { translate: 12vw -7vh; rotate: 10deg; }
      60% { translate: 20vw 5vh; rotate: -6deg; }
    }

    @keyframes butterflyWing {
      from { transform: rotateY(0) rotate(-18deg); }
      to { transform: rotateY(62deg) rotate(-8deg); }
    }

    @keyframes butterflyWingRight {
      from { transform: rotateY(0) rotate(18deg); }
      to { transform: rotateY(-62deg) rotate(8deg); }
    }

    @media (max-width: 560px) {
      .source-note {
        display: none;
      }

      .scene-bg {
        object-position: center center;
      }

      .stage {
        width: 100vw;
        min-height: 520px;
      }

      .chick-wrap {
        width: 292px;
        bottom: 92px;
      }

      .shadow {
        bottom: 82px;
        width: 230px;
      }

      .dirt {
        bottom: 60px;
        width: 282px;
      }

      .egg.left {
        left: 38px;
      }

      .egg.right {
        right: 32px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="水彩草地里的可爱小鸡动效">
    <img class="scene-bg" src="assets/storybook-meadow-background.png" alt="" aria-hidden="true">
    <div class="bg-wash" aria-hidden="true"></div>

    <div class="petal-field" aria-hidden="true">
      <span class="petal"></span>
      <span class="petal"></span>
      <span class="petal"></span>
      <span class="petal"></span>
      <span class="petal"></span>
      <span class="petal"></span>
      <span class="petal"></span>
      <span class="petal"></span>
    </div>

    <div class="firefly one" aria-hidden="true"></div>
    <div class="firefly two" aria-hidden="true"></div>
    <div class="firefly three" aria-hidden="true"></div>
    <div class="firefly four" aria-hidden="true"></div>
    <div class="butterfly one" aria-hidden="true"><span></span></div>
    <div class="butterfly two" aria-hidden="true"><span></span></div>

    <section class="stage" tabindex="0" aria-label="可点击的小鸡图片">
      <div class="spark one" aria-hidden="true"></div>
      <div class="spark two" aria-hidden="true"></div>
      <div class="spark three" aria-hidden="true"></div>
      <div class="bubble" aria-live="polite">peep!</div>
      <div class="dirt" aria-hidden="true"></div>
      <div class="shadow" aria-hidden="true"></div>
      <div class="egg left" aria-hidden="true"></div>
      <div class="egg right" aria-hidden="true"></div>
      <div class="chick-wrap">
        <div class="chick-tilt">
          <div class="glow" aria-hidden="true"></div>
          <img class="asset-chick" src="assets/chick-user-transparent.png" alt="一只黄色水彩风格卡通小鸡">
        </div>
      </div>
    </section>

    <div class="grass-blade blade-1" aria-hidden="true"></div>
    <div class="grass-blade blade-2" aria-hidden="true"></div>
    <div class="grass-blade blade-3" aria-hidden="true"></div>
    <div class="grass-blade blade-4" aria-hidden="true"></div>
    <div class="grass-blade blade-5" aria-hidden="true"></div>
    <div class="grass-blade blade-6" aria-hidden="true"></div>

    <div class="source-note">Chick: provided image · Background: generated</div>
  </main>

  <script>
    const stage = document.querySelector(".stage");
    const bubble = document.querySelector(".bubble");
    const words = ["peep!", "chirp!", "piu!", "tweet!"];
    let chirpIndex = 0;

    function chirp() {
      bubble.textContent = words[chirpIndex % words.length];
      chirpIndex += 1;
      bubble.classList.remove("show");
      void bubble.offsetWidth;
      bubble.classList.add("show");
    }

    stage.addEventListener("click", chirp);
    stage.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        chirp();
      }
    });
  </script>
</body>

    function show_site_runtime(){

    i=24*60*60*1000;
    d=T/i;
    D=Math.floor(d); // 计算天数并向下取整
    h=(d-D)*24;
    H=Math.floor(h); // 计算剩余不足一天的小时数并向下取整
    m=(h-H)*60;
    M=Math.floor(m); // 计算剩余不足一小时的分钟数并向下取整
    s=(m-M)*60
    S=Math.floor(s); // 计算剩余不足一分钟的秒数并向下取整
    site_runtime.innerHTML= D + " 天 " + H + " 小时 " + M + " 分 " + S + " 秒 "
    }
    show_site_runtime();
</script>
